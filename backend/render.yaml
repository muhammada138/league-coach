services:
  - type: web
    name: league-coach-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RIOT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RIOT_REGION
        value: na1
      - key: RIOT_ROUTING
        value: americas
